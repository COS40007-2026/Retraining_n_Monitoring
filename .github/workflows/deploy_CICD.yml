name: MLOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      epochs:
        description: 'Number of training epochs'
        required: false
        default: '100'

jobs:
  train-and-evaluate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── FIXED: no env block, secrets referenced directly in run ──
      - name: Configure DVC remote (DagsHub)
        run: |
          dvc remote modify myremote auth basic
          dvc remote modify myremote user ${{ secrets.DAGSHUB_USERNAME }}
          dvc remote modify myremote password ${{ secrets.DAGSHUB_TOKEN }}

      - name: Pull data with DVC
        run: dvc pull

      - name: Override epochs if provided
        if: github.event_name == 'workflow_dispatch'
        run: |
          python - <<'EOF'
          import yaml
          with open("params.yaml") as f:
              p = yaml.safe_load(f)
          p["model"]["epochs"] = int("${{ github.event.inputs.epochs }}")
          with open("params.yaml", "w") as f:
              yaml.dump(p, f)
          print(f"Epochs set to {p['model']['epochs']}")
          EOF

      - name: Run DVC pipeline
        run: dvc repro

      - name: Show metrics
        run: |
          dvc metrics show
          dvc metrics diff HEAD~1 || echo "No previous run to compare against"

      - name: Push artifacts to DVC remote
        run: dvc push

      - name: Commit dvc.lock and metrics
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dvc.lock metrics.json dvclive/
          git diff --staged --quiet || git commit -m "update dvc.lock and metrics [skip ci]"
          git push

      - name: Upload trained model
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: models/model.keras
          retention-days: 30

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: results
          path: |
            model_results.png
            metrics.json
            dvclive/report.html
          retention-days: 30

      - name: Post PR comment with metrics diff
        if: github.event_name == 'pull_request'
        run: |
          METRICS=$(dvc metrics diff --md || echo "No metrics diff available")
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "## Metrics comparison
            ${METRICS}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}